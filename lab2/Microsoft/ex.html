<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsoft Clone</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background: #f2f2f2;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }
        .logo {
            font-size: 20px;
            font-weight: bold;
        }
        .nav {
            display: flex;
            gap: 20px;
        }
        .banner {
            background: url('banner.jpg') no-repeat center/cover;
            color: white;
            padding: 50px;
            text-align: center;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
        }
        .card {
            border: 1px solid #ddd;
            padding: 15px;
            text-align: center;
        }
        .card img {
            max-width: 100%;
        }
        .footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Microsoft</div>
        <nav class="nav">
            <a href="#">Microsoft 365</a>
            <a href="#">Xbox</a>
            <a href="#">Windows</a>
        </nav>
    </header>
    <section class="banner">
        <h1>Copilot + PC</h1>
        <p>Discover the latest in AI-powered computing.</p>
        <button>Shop now</button>
    </section>
    <div class="container">
        <div class="card">
            <img src="laptop.jpg" alt="Laptop">
            <h3>Surface Laptop</h3>
            <button>Shop now</button>
        </div>
        <div class="card">
            <img src="xbox.jpg" alt="Xbox">
            <h3>Xbox Series S</h3>
            <button>Shop now</button>
        </div>
        <div class="card">
            <img src="controller.jpg" alt="Controller">
            <h3>Xbox Controllers</h3>
            <button>Shop now</button>
        </div>
    </div>
    <footer class="footer">
        <p>&copy; 2025 Microsoft</p>
    </footer>
</body>
</html>
