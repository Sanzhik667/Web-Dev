<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: #2e3d49; /* Устанавливаем тёмный фон для видимости границ */
            color: white; /* Цвет текста */
        }
        table, th, td {
            border: 1px solid white; /* Белая граница */
            border-collapse: collapse; /* Убирает двойные линии между ячейками */
        }
        table {
            margin-bottom: 20px; /* Отступ между таблицами */
        }
        th, td {
            padding: 8px; /* Отступ внутри ячеек */
            text-align: center; /* Центровка текста */
        }
    </style>
</head>

<body>
    
    <!-- Первая таблица -->
    <table>
        <tr>
          <td>Emil</td>
          <td>Tobias</td>
          <td>Linus</td>
        </tr>
    </table>

    <!-- Вторая таблица -->
    <table>
        <tr>
          <td>Emil</td>
          <td>Tobias</td>
          <td>Linus</td>
        </tr>
        <tr>
          <td>16</td>
          <td>14</td>
          <td>10</td>
        </tr>
    </table>

    <!-- Третья таблица с заголовками -->
    <table>
        <tr>
          <th>Person 1</th>
          <th>Person 2</th>
          <th>Person 3</th>
        </tr>
        <tr>
          <td>Emil</td>
          <td>Tobias</td>
          <td>Linus</td>
        </tr>
        <tr>
          <td>16</td>
          <td>14</td>
          <td>10</td>
        </tr>
    </table>
</body>
</html>
